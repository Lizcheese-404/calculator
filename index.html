<!DOCTYPE html>
<html lang="ko" data-mode="dark" data-theme="purple">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계산기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 우측 상단 설정 버튼 -->
  <button class="settings-btn" id="settingsBtn" aria-label="테마 설정">⚙️</button>

  <!-- 테마 패널 (기본 숨김) -->
  <div class="theme-panel" id="themePanel">
    <div class="theme-panel-header">
      <span class="theme-panel-title">테마 설정</span>
      <button class="theme-panel-close" id="themeClose" aria-label="닫기">✕</button>
    </div>
    <div class="theme-section-label">색상</div>
    <div class="theme-swatches" id="swatches"></div>
    <div class="theme-section-label">모드</div>
    <div class="mode-buttons">
      <button class="mode-btn" id="modeDark"  data-mode="dark">🌙 다크</button>
      <button class="mode-btn" id="modeLight" data-mode="light">☀️ 라이트</button>
    </div>
  </div>
  <div class="theme-backdrop" id="themeBackdrop"></div>

  <div class="app">

    <!-- 계산기 본체 -->
    <div class="calculator">
      <div class="display">
        <div class="history-toolbar" id="historyToolbar">
          <button class="history-expand-btn" id="historyExpandBtn" aria-label="히스토리 펼치기">∧ 전체 보기</button>
          <button class="history-clear-btn" id="historyClearBtn" aria-label="히스토리 지우기">✕ 지우기</button>
        </div>
        <div class="display-history" id="history"></div>
        <div class="display-expression" id="expression"></div>
        <div class="display-current" id="current">0</div>
      </div>
      <div class="buttons">
        <button class="btn btn-util" data-action="clear" aria-label="전체 초기화">C</button>
        <button class="btn btn-util" data-action="backspace" aria-label="한 자리 삭제">⌫</button>
        <button class="btn btn-util" data-action="percent" aria-label="퍼센트">%</button>
        <button class="btn btn-operator" data-action="operator" data-value="÷" aria-label="나누기">÷</button>

        <button class="btn btn-number" data-action="number" data-value="7">7</button>
        <button class="btn btn-number" data-action="number" data-value="8">8</button>
        <button class="btn btn-number" data-action="number" data-value="9">9</button>
        <button class="btn btn-operator" data-action="operator" data-value="×" aria-label="곱하기">×</button>

        <button class="btn btn-number" data-action="number" data-value="4">4</button>
        <button class="btn btn-number" data-action="number" data-value="5">5</button>
        <button class="btn btn-number" data-action="number" data-value="6">6</button>
        <button class="btn btn-operator" data-action="operator" data-value="-" aria-label="빼기">−</button>

        <button class="btn btn-number" data-action="number" data-value="1">1</button>
        <button class="btn btn-number" data-action="number" data-value="2">2</button>
        <button class="btn btn-number" data-action="number" data-value="3">3</button>
        <button class="btn btn-operator" data-action="operator" data-value="+" aria-label="더하기">+</button>

        <button class="btn btn-number btn-zero" data-action="number" data-value="0">0</button>
        <button class="btn btn-number" data-action="decimal" aria-label="소수점">.</button>
        <button class="btn btn-equals" data-action="equals" aria-label="계산">=</button>
      </div>
    </div>

    <!-- 우측 패널 묶음 -->
    <div class="side-panels">

      <!-- 월 분할 패널 -->
      <div class="month-panel">
        <div class="month-panel-title">월 분할</div>
        <p class="month-panel-desc">현재 숫자를 12로 나눠<br>월별 금액을 계산합니다</p>
        <div class="month-divider"></div>
        <div class="month-result-box">
          <span class="month-result-label">결과</span>
          <div class="value-copy-wrap" id="monthResultWrap" data-raw="">
            <span class="month-result-value" id="monthResult">-</span>
            <button class="copy-btn" data-raw="" aria-label="복사">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 세금 계산 패널 -->
      <div class="tax-panel">
        <div class="tax-panel-title">세금 계산</div>

        <div class="tax-rate-btns" id="taxRateBtns">
          <button class="tax-rate-btn active" data-tax="vat">부가세<br><small>10%</small></button>
          <button class="tax-rate-btn" data-tax="33">사업소득<br><small>3.3%</small></button>
          <button class="tax-rate-btn" data-tax="88">기타소득<br><small>8.8%</small></button>
          <button class="tax-rate-btn" data-tax="custom">직접<br><small>입력</small></button>
        </div>

        <div class="tax-custom-wrap" id="taxCustomWrap">
          <input class="tax-custom-input" id="taxCustomRate" type="number"
            placeholder="세율 (%)" min="0.1" max="99.9" step="0.1">
        </div>

        <div class="tax-divider"></div>

        <div class="tax-section">
          <div class="tax-section-label" id="taxAddLabel">세전 기준</div>
          <div id="taxAddRows"></div>
        </div>

        <div class="tax-divider"></div>

        <div class="tax-section">
          <div class="tax-section-label" id="taxSubLabel">세후 기준</div>
          <div id="taxSubRows"></div>
        </div>
      </div>

      <!-- 환율 변환 패널 -->
      <div class="tax-panel">
        <div class="currency-panel-header">
          <div class="tax-panel-title">환율 변환</div>
          <button class="currency-refresh-btn" id="currencyRefreshBtn" aria-label="환율 새로고침">↻</button>
        </div>

        <div class="currency-api-status" id="currencyApiStatus"></div>

        <div class="tax-rate-btns" id="currencyBtns">
          <button class="tax-rate-btn active" data-curr="usd">USD<br><small>$</small></button>
          <button class="tax-rate-btn" data-curr="jpy">JPY<br><small>¥</small></button>
          <button class="tax-rate-btn" data-curr="eur">EUR<br><small>€</small></button>
          <button class="tax-rate-btn" data-curr="custom">직접<br><small>입력</small></button>
        </div>

        <div class="tax-custom-wrap" id="currencySymbolWrap">
          <input class="tax-custom-input" id="currencySymbolInput" type="text"
            placeholder="기호 (예: CNY)" maxlength="5">
        </div>

        <div class="currency-rate-row">
          <span class="currency-rate-label" id="currencyRateLabel">1 USD =</span>
          <input class="currency-rate-input" id="currencyRateInput" type="number"
            placeholder="환율" min="0.01" step="0.01">
          <span class="currency-rate-unit">KRW</span>
        </div>

        <div class="tax-divider"></div>

        <div class="tax-section">
          <div class="tax-section-label">외화 → 원화</div>
          <div class="tax-row">
            <span class="tax-row-label" id="currFtoKFrom">—</span>
            <span class="tax-row-value total" id="currFtoKValue" data-raw="">—</span>
          </div>
        </div>

        <div class="tax-divider"></div>

        <div class="tax-section">
          <div class="tax-section-label">원화 → 외화</div>
          <div class="tax-row">
            <span class="tax-row-label" id="currKtoFFrom">—</span>
            <span class="tax-row-value total" id="currKtoFValue" data-raw="">—</span>
          </div>
        </div>
      </div>

    </div>

  </div>

  <script src="config.js" onerror="window.EXIM_PROXY_URL=''"></script>
  <script>window.EXIM_PROXY_URL = window.EXIM_PROXY_URL || '';</script>
  <script src="theme.js"></script>
  <script src="calculator.js"></script>
</body>
</html>
